name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # The host-side Rust crates: the swap engine and the daemon. Both are kept out of the
  # BPF workspace, so they're tested directly by manifest path. The daemon pulls the
  # `suture-monero` git tag — CI has network, so that resolves fine.
  host:
    name: host crates (engine + daemon)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            engine
            daemon
      - name: engine tests
        run: cargo test --manifest-path engine/Cargo.toml
      - name: daemon tests
        run: cargo test --manifest-path daemon/Cargo.toml

  # The on-chain program built to BPF, then the bankrun suite run against it.
  program:
    name: program (build-sbf) + bankrun
    runs-on: ubuntu-latest
    env:
      AGAVE_VERSION: "4.0.1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # `cargo build-sbf` and its platform-tools ship with the Agave CLI. Pinning a specific
      # version keeps the BPF build reproducible; bump AGAVE_VERSION intentionally —
      # see https://github.com/anza-xyz/agave/releases. Must be new enough that its bundled
      # Rust supports the dependency tree's edition (4.0.1 bundles rustc 1.89; the older
      # 2.2.x line bundles 1.84, which can't parse edition2024 crates like crypto-common).
      - name: Cache Solana platform-tools
        uses: actions/cache@v4
        with:
          path: ~/.cache/solana
          key: solana-platform-tools-${{ runner.os }}-${{ env.AGAVE_VERSION }}
      - name: Install the Solana (Agave) CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${AGAVE_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      # Produces target/deploy/sol_escrow.so (+ a fresh program keypair, which is
      # gitignored) that bankrun loads via BPF_OUT_DIR.
      - name: Build the program (BPF)
        working-directory: programs/sol-escrow
        run: cargo build-sbf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install JS deps
        run: npm ci
      - name: Program test suite (bankrun)
        run: npm test
